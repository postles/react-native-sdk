name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.repository_owner == 'postles'
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run publish:npm --tag=$(echo ${GITHUB_REF_NAME#v})
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
